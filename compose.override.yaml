services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-mydb}
    volumes:
      - db:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-5434}:${DB_PORT:-5432}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-mydb}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ./.env
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build: 
      context: .
      dockerfile: Dockerfile
      target: dev
    command: ["uv", "run", "celery", "-A", "src.worker.celery_app", "worker", "--loglevel=info"]
    env_file:
      - ./.env
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  db:
    driver: local